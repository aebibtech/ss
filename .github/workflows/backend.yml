name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Build, Migrate and Deploy Backend
    runs-on: ubuntu-latest
    env:
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Infra Dependencies
        run: |
          cd infra
          npm ci

      - name: Get Repository and DB Connection Info from Pulumi
        id: pulumi-info
        run: |
          cd infra
          # Initialize stack if not initialized, select dev stack
          pulumi stack select dev || pulumi stack init dev
          
          # Get registry URL (GCP Artifact Registry)
          REGISTRY_URL=$(pulumi stack output registryUrl || echo "")
          echo "registry_url=$REGISTRY_URL" >> $GITHUB_OUTPUT
          
          # Get Database Connection String
          DB_CONN=$(pulumi stack output dbConnectionUri --show-secrets || echo "")
          echo "db_connection_uri=$DB_CONN" >> $GITHUB_OUTPUT
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Configure Docker authentication for GCP Artifact Registry
        if: steps.pulumi-info.outputs.registry_url != ''
        run: |
          # Extract the hostname from the registry URL (e.g. us-central1-docker.pkg.dev)
          REGISTRY_HOST=$(echo "${{ steps.pulumi-info.outputs.registry_url }}" | awk -F/ '{print $1}')
          gcloud auth configure-docker $REGISTRY_HOST --quiet

      - name: Build and Push Backend Docker Image
        if: steps.pulumi-info.outputs.registry_url != ''
        run: |
          REGISTRY_URL="${{ steps.pulumi-info.outputs.registry_url }}"
          IMAGE_TAG="${{ github.sha }}"
          
          echo "Building image for tag: $IMAGE_TAG"
          docker build -t $REGISTRY_URL/backend:$IMAGE_TAG -t $REGISTRY_URL/backend:latest ./backend
          
          echo "Pushing image..."
          docker push $REGISTRY_URL/backend:$IMAGE_TAG
          docker push $REGISTRY_URL/backend:latest

      - name: Run Drizzle Database Migrations
        if: steps.pulumi-info.outputs.db_connection_uri != ''
        run: |
          cd backend
          bun install --frozen-lockfile
          
          # Run migrations
          DATABASE_URL="${{ steps.pulumi-info.outputs.db_connection_uri }}" bunx drizzle-kit migrate
        env:
          ConnectionStrings__db: ${{ steps.pulumi-info.outputs.db_connection_uri }}

      - name: Update Cloud Run Service via Pulumi
        run: |
          cd infra
          # Update stack config with the new image tag
          pulumi config set backendImageTag ${{ github.sha }}
          # Apply the updates to Cloud Run
          pulumi up --yes --skip-preview
