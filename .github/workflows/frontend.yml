name: Frontend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'brand/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

jobs:
  # Job 1: Build and deploy Astro Landing Page to Cloudflare Pages
  deploy-landing-page:
    name: Deploy Landing Page (Astro)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd brand
          npm ci

      - name: Build Astro Brand Site
        run: |
          cd brand
          npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ss-landing-page
          directory: brand/dist
          gitBranch: main

  # Job 2: Build and deploy Flutter Web to Cloudflare Pages
  deploy-frontend-web:
    name: Deploy Frontend Web (Flutter)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5

      - name: Get Backend API URL from Pulumi
        id: pulumi-info
        run: |
          cd infra
          # Initialize stack if not initialized, select dev stack
          pulumi stack select dev || pulumi stack init dev
          
          # Get backend API URL from stack output
          BACKEND_URL=$(pulumi stack output backendApiUrl || echo "https://ss-backend.pages.dev")
          echo "backend_api_url=$BACKEND_URL" >> $GITHUB_OUTPUT
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd frontend
          flutter pub get

      - name: Build Web Application
        run: |
          cd frontend
          flutter build web --release --dart-define=BACKEND_HTTP=${{ steps.pulumi-info.outputs.backend_api_url }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ss-frontend
          directory: frontend/build/web
          gitBranch: main

  # Job 3: Build and release Flutter Android App to Google Play
  deploy-frontend-android:
    name: Deploy Android App (Flutter)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5

      - name: Get Backend API URL from Pulumi
        id: pulumi-info
        run: |
          cd infra
          # Initialize stack if not initialized, select dev stack
          pulumi stack select dev || pulumi stack init dev
          
          # Get backend API URL from stack output
          BACKEND_URL=$(pulumi stack output backendApiUrl || echo "https://ss-backend.pages.dev")
          echo "backend_api_url=$BACKEND_URL" >> $GITHUB_OUTPUT
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd frontend
          flutter pub get

      - name: Decode Android Keystore
        if: env.has_keystore == 'true'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > frontend/android/app/release.jks
        env:
          has_keystore: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}

      - name: Create key.properties file
        if: env.has_keystore == 'true'
        run: |
          cat <<EOF > frontend/android/key.properties
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          storeFile=release.jks
          EOF
        env:
          has_keystore: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}

      - name: Build Android App Bundle (AAB)
        run: |
          cd frontend
          flutter build appbundle --release --dart-define=BACKEND_HTTP=${{ steps.pulumi-info.outputs.backend_api_url }}

      - name: Publish to Google Play Store (Internal Track)
        if: env.has_play_credentials == 'true'
        uses: r0adk5l/google-play-publisher@v1.4.1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.example.frontend
          releaseFiles: frontend/build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
        env:
          has_play_credentials: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' }}
